# 파일첨부 크기 - 파일1개당, 파일업로드 이동
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB
#spring.servlet.multipart.file-count-threshold=100
server.tomcat.max-http-form-post-size=2GB
server.tomcat.max-parameter-count=1000
server.tomcat.max-http-header-size=2GB
server.tomcat.max-part-count=1000


#-----------------------------------------------------------------
# jpa에서 entity 명령어 처리 대한 내용
# hibernate 설정
spring.jpa.open-in-view=true
# 프로젝트 실행시 자동으로 DDL 생성 : create,update,none → 컬럼속성은 알파벳 순으로 생성됨.
spring.jpa.hibernate.ddl-auto=none

# entity,DB속성의 변수명 그대로 사용
# org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# jpa numbering 전략 - oracle시퀀스 전략
spring.jpa.hibernate.use-new-id-generator-mappings=false
# SQL구문을 보여줄지 결정 
# SQL을 정렬해서 출력
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

